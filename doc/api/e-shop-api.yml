                "is_active": true
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Store - Delete
          type: http
          seq: 5
        http:
          method: PATCH
          url: '{{base_url}}/api/v1/stores/:id'
          params:
            - name: id
              value: 59e3e777-7050-4b69-b7ee-da488d54bd61
