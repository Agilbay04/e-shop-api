      - info:
          name: Order - Get All/By ID copy
          type: http
          seq: 1
        http:
          method: GET
          url: '{{base_url}}/api/v1/orders?page=1&limit=10&sort_by=created_at&order_by=desc&search='
          params:
            - name: page
              value: '1'
              type: query
            - name: limit
              value: '10'
              type: query
            - name: sort_by
              value: created_at
              type: query
            - name: order_by
              value: desc
              type: query
            - name: search
