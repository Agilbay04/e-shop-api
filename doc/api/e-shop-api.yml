                  {
                    "product_id": "703650f9-5d99-4f75-9d27-40914fd84150",
                    "quantity": 100
                  }
                ]
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
