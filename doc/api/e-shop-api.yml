          type: http
          seq: 2
        http:
          method: POST
          url: '{{base_url}}/api/v1/orders'
          body:
            type: json
            data: |-
              {
                "is_checkout": true,
                "order_items": [
                  {
                    "product_id": "a5b8f242-44c6-4c93-8127-7ed78327861e",
