opencollection: 1.0.0
info:
  name: e-shop-api (training golang)
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: Local Env
      variables:
        - name: base_url
          value: http://localhost:8001
        - name: bearer_token
          secret: true
items:
  - info:
      name: auth
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: Login
          type: http
          seq: 1
        http:
          method: POST
          url: '{{base_url}}/api/v1/auth/login'
          body:
            type: json
            data: |-
              {
                "email": "pragmanta@gmail.com",
                "password": "rahasia123"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Register
          type: http
          seq: 2
        http:
          method: POST
          url: '{{base_url}}/api/v1/auth/register'
          body:
            type: json
            data: |-
              {
                "username": "pragmanta",
                "email": "pragmanta@gmail.com",
                "password": "rahasia123",
                "role": "buyer"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Profile
          type: http
          seq: 3
        http:
          method: GET
          url: '{{base_url}}/api/v1/auth/profile'
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: product
      type: folder
      seq: 3
    request:
      auth: inherit
    items:
      - info:
          name: Product - Create
          type: http
          seq: 2
        http:
          method: POST
          url: '{{base_url}}/api/v1/products'
          body:
            type: json
            data: |-
              {
                "name": "Cat",
                "description": "Cat kualitas bagus",
                "price": 80000,
                "stock": 500,
                "unit": "bucket"
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Product - Get All/By ID
          type: http
          seq: 1
        http:
          method: GET
          url: '{{base_url}}/api/v1/products?page=1&limit=10&sort_by=created_at&order_by=desc&search='
          params:
            - name: page
              value: '1'
              type: query
            - name: limit
              value: '10'
              type: query
            - name: sort_by
              value: created_at
              type: query
            - name: order_by
              value: desc
              type: query
            - name: search
              value: ''
              type: query
            - name: store_id
              value: 59e3e777-7050-4b69-b7ee-da488d54bd61
              type: query
              disabled: true
            - name: id
              value: 703650f9-5d99-4f75-9d27-40914fd84150
              type: query
              disabled: true
            - name: min_price
              value: ''
              type: query
              disabled: true
            - name: max_price
              value: ''
              type: query
              disabled: true
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Product - Update
          type: http
          seq: 3
        http:
          method: PUT
          url: '{{base_url}}/api/v1/products/:id'
          params:
            - name: id
              value: a5b8f242-44c6-4c93-8127-7ed78327861e
              type: path
          body:
            type: json
            data: |-
              {
                "name": "Genteng Merah",
                "description": "Genteng kualitas bagus",
                "price": 11500,
                "stock": 10000,
                "unit": "item"
                //"is_active": true
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Product - Delete
          type: http
          seq: 4
        http:
          method: PATCH
          url: '{{base_url}}/api/v1/products/:id'
          params:
            - name: id
              value: a5b8f242-44c6-4c93-8127-7ed78327861e
              type: path
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Product - Activate
          type: http
          seq: 5
        http:
          method: PATCH
          url: '{{base_url}}/api/v1/products/activate'
          body:
            type: json
            data: |-
              {
                "id": "a5b8f242-44c6-4c93-8127-7ed78327861e",
                "is_active": true
