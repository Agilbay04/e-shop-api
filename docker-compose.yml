version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: go-psql
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - e_shop_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: go-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - go_redis_data:/data

volumes:
  e_shop_data:
  go_redis_data: